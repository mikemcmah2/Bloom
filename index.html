<script>
  window.addEventListener('error', function (e) {
    var root = document.getElementById('root');
    if (root) {
      root.innerHTML = '<pre style="padding:20px;color:#a00;white-space:pre-wrap;font-family:monospace;font-size:13px;line-height:1.5;">' +
        'Something failed to load:\n\n' + (e.message || 'Unknown error') +
        (e.filename ? ('\n\nFile: ' + e.filename + (e.lineno ? (':' + e.lineno) : '')) : '') +
        '</pre>';
    }
  });
  setTimeout(function () {
    var root = document.getElementById('root');
    if (root && root.innerHTML.trim() === '') {
      root.innerHTML = '<pre style="padding:20px;color:#a00;font-family:monospace;font-size:13px;">Nothing rendered after 6 seconds.\nThis usually means a script from a CDN (React, Babel, or Tailwind) was blocked — try disabling any content/ad blocker for this site, or a different network.</pre>';
    }
  }, 6000);
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useMemo, useCallback } = React;

// ---------- date helpers ----------
const toDate = (s) => { const [y,m,d] = s.split("-").map(Number); return new Date(y, m-1, d); };
const toISO = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const addDays = (s,n) => { const d = toDate(s); d.setDate(d.getDate()+n); return toISO(d); };
const diffDays = (a,b) => Math.round((toDate(b) - toDate(a)) / 86400000);
const todayISO = () => toISO(new Date());
const fmt = (s) => toDate(s).toLocaleDateString("en-US", { month:"short", day:"numeric" });
const fmtFull = (s) => toDate(s).toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });

const DEFAULT_CYCLE_LENGTH = 28, DEFAULT_MOOD_OFFSET = 2, DEFAULT_LUTEAL = 14;

const SEED_CYCLES = [
  { id:"c1", bleedingStart:"2026-04-05", moodDay:"2026-04-03", ovulationActual:null },
  { id:"c2", bleedingStart:"2026-05-03", moodDay:"2026-05-02", ovulationActual:null },
  { id:"c3", bleedingStart:"2026-05-29", moodDay:"2026-05-28", ovulationActual:null },
  { id:"c4", bleedingStart:"2026-06-23", moodDay:"2026-06-20", ovulationActual:null },
];
const SEED_INTIMACY = ["2026-04-14","2026-05-10","2026-05-12","2026-05-23","2026-06-06","2026-06-09","2026-06-27","2026-07-04"];

// ---------- storage ----------
function loadData() {
  let cycles, intimacy;
  try { cycles = JSON.parse(localStorage.getItem("totu_cycles")); } catch { cycles = null; }
  try { intimacy = JSON.parse(localStorage.getItem("totu_intimacy")); } catch { intimacy = null; }
  if (!cycles) { cycles = SEED_CYCLES; localStorage.setItem("totu_cycles", JSON.stringify(cycles)); }
  if (!intimacy) { intimacy = SEED_INTIMACY; localStorage.setItem("totu_intimacy", JSON.stringify(intimacy)); }
  return { cycles, intimacy };
}
const saveCycles = (c) => localStorage.setItem("totu_cycles", JSON.stringify(c));
const saveIntimacy = (i) => localStorage.setItem("totu_intimacy", JSON.stringify(i));

// ---------- password (hashed, local-only lock screen, not encryption) ----------
async function hashPassword(pw) {
  const enc = new TextEncoder().encode("two-of-us-app::" + pw);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2,"0")).join("");
}
const hasPassword = () => !!localStorage.getItem("totu_pw_hash");
async function setPassword(pw) { localStorage.setItem("totu_pw_hash", await hashPassword(pw)); }
async function checkPassword(pw) { return (await hashPassword(pw)) === localStorage.getItem("totu_pw_hash"); }

// ---------- prediction engine ----------
function computeModel(cycles) {
  const sorted = [...cycles].sort((a,b) => (a.bleedingStart < b.bleedingStart ? -1 : 1));
  const lengths = [];
  for (let i=1;i<sorted.length;i++) lengths.push(diffDays(sorted[i-1].bleedingStart, sorted[i].bleedingStart));
  const cycleLength = lengths.length ? Math.round(lengths.reduce((a,b)=>a+b,0)/lengths.length) : DEFAULT_CYCLE_LENGTH;

  const moodOffsets = sorted.filter(c=>c.moodDay).map(c=>diffDays(c.moodDay, c.bleedingStart));
  const moodOffset = moodOffsets.length ? Math.round(moodOffsets.reduce((a,b)=>a+b,0)/moodOffsets.length) : DEFAULT_MOOD_OFFSET;

  const lutealLens = [];
  for (let i=0;i<sorted.length;i++) {
    const c = sorted[i];
    if (!c.ovulationActual) continue;
    const next = sorted[i+1];
    if (next) lutealLens.push(diffDays(c.ovulationActual, next.bleedingStart));
  }
  const luteal = lutealLens.length ? Math.round(lutealLens.reduce((a,b)=>a+b,0)/lutealLens.length) : DEFAULT_LUTEAL;

  const cyclesWithEstimates = sorted.map((c,i) => {
    const next = sorted[i+1];
    const nextStart = next ? next.bleedingStart : addDays(c.bleedingStart, cycleLength);
    let ovulationEstimate = c.ovulationActual || addDays(nextStart, -luteal);
    return { ...c, ovulationEstimate, cycleEnd: nextStart };
  });

  const last = sorted[sorted.length-1];
  const predictedBleeding = last ? addDays(last.bleedingStart, cycleLength) : null;
  const predictedMood = predictedBleeding ? addDays(predictedBleeding, -moodOffset) : null;
  const predictedOvulation = predictedBleeding ? addDays(predictedBleeding, -luteal) : null;

  return { cycleLength, moodOffset, luteal, cyclesWithEstimates, predictedBleeding, predictedMood, predictedOvulation, last };
}

// ---------- palette ----------
const COLORS = {
  bg:"#FFF7EF", card:"#FFFFFF", ink:"#3E2B2F", inkSoft:"#8A6E72",
  coral:"#E8677D", coralSoft:"#FBD9DF", peach:"#F6A65C", peachSoft:"#FDE6CC",
  plum:"#8C6BAE", plumSoft:"#E6DBF3", gold:"#E3B23C", goldSoft:"#F8E9C4",
};

function daysUntilLabel(dateStr) {
  const n = diffDays(todayISO(), dateStr);
  if (n===0) return "Today";
  if (n===1) return "Tomorrow";
  if (n>1) return `In ${n} days`;
  if (n===-1) return "Yesterday";
  return `${Math.abs(n)} days ago`;
}

function Pill({ color, bg, emoji, label, sub }) {
  return (
    <div className="rounded-2xl p-3 flex flex-col gap-1" style={{ background: bg }}>
      <div className="flex items-center gap-1.5" style={{ color }}>
        <span>{emoji}</span>
        <span className="text-xs font-bold uppercase tracking-wide">{label}</span>
      </div>
      <div className="text-lg font-extrabold" style={{ color: COLORS.ink }}>{sub}</div>
    </div>
  );
}

// ---------- cycle wheel ----------
function polar(cx,cy,r,angleDeg) { const a=((angleDeg-90)*Math.PI)/180; return { x: cx+r*Math.cos(a), y: cy+r*Math.sin(a) }; }
function arcPath(cx,cy,r,startDeg,endDeg) {
  const s = polar(cx,cy,r,endDeg), e = polar(cx,cy,r,startDeg);
  const largeArc = endDeg-startDeg <= 180 ? 0 : 1;
  return `M ${s.x} ${s.y} A ${r} ${r} 0 ${largeArc} 0 ${e.x} ${e.y}`;
}
function CycleWheel({ model }) {
  const { cycleLength, luteal, last } = model;
  if (!last) return null;
  const dayNum = Math.max(1, Math.min(cycleLength, diffDays(last.bleedingStart, todayISO())+1));
  const cx=110, cy=110, r=82, stroke=20;
  const dToDeg = (day) => ((day-1)/cycleLength)*360;
  const ovDay = cycleLength - luteal + 1;
  const segments = [
    { from:1, to:6, color:COLORS.coral, label:"Period" },
    { from:6, to:Math.max(6, ovDay-3), color:COLORS.peach, label:"Follicular" },
    { from:Math.max(6, ovDay-3), to:ovDay+2, color:COLORS.plum, label:"Fertile window" },
    { from:ovDay+2, to:cycleLength+1, color:COLORS.gold, label:"Luteal" },
  ];
  const marker = polar(cx,cy,r,dToDeg(dayNum));
  return (
    <div className="flex flex-col items-center">
      <svg width="220" height="220" viewBox="0 0 220 220">
        {segments.map((seg,i) => <path key={i} d={arcPath(cx,cy,r,dToDeg(seg.from),dToDeg(seg.to))} stroke={seg.color} strokeWidth={stroke} fill="none" strokeLinecap="round" opacity={0.9} />)}
        <circle cx={marker.x} cy={marker.y} r={9} fill={COLORS.ink} stroke="#fff" strokeWidth={3} />
        <text x={cx} y={cy-6} textAnchor="middle" fontSize="26" fontWeight="800" fill={COLORS.ink}>{`Day ${dayNum}`}</text>
        <text x={cx} y={cy+16} textAnchor="middle" fontSize="12" fontWeight="600" fill={COLORS.inkSoft}>{`of ~${cycleLength} days`}</text>
      </svg>
      <div className="flex gap-3 flex-wrap justify-center mt-1">
        {segments.map((s,i) => <div key={i} className="flex items-center gap-1 text-xs font-semibold" style={{ color: COLORS.inkSoft }}><span className="inline-block w-2.5 h-2.5 rounded-full" style={{ background:s.color }} />{s.label}</div>)}
      </div>
    </div>
  );
}

// ---------- simple dependency-free bar chart ----------
function SimpleBarChart({ data, barColor, height=150, highlightZero=false }) {
  const max = Math.max(1, ...data.map(d=>d.value));
  const w = 100 / data.length;
  return (
    <div style={{ height }} className="flex items-end gap-0.5">
      {data.map((d,i) => (
        <div key={i} className="flex flex-col items-center justify-end h-full" style={{ width: `${w}%` }}>
          <div className="w-full rounded-t-md" style={{
            height: `${(d.value/max)*85}%`,
            background: highlightZero && d.day===0 ? COLORS.plum : (d.value===0 ? COLORS.peachSoft : barColor),
            minHeight: d.value>0 ? 4 : 2,
          }} title={`${d.label}: ${d.value}`} />
          <div className="mt-1" style={{ fontSize:9, color: COLORS.inkSoft, fontWeight:700 }}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}

// ---------- lock screen ----------
function LockScreen({ onUnlock }) {
  const [mode, setMode] = useState(null);
  const [pw, setPw] = useState(""); const [pw2, setPw2] = useState(""); const [error, setError] = useState("");
  useEffect(() => { setMode(hasPassword() ? "enter" : "create"); }, []);

  async function handleCreate(e) {
    e.preventDefault();
    if (pw.length < 4) return setError("Use at least 4 characters.");
    if (pw !== pw2) return setError("Those don't match.");
    await setPassword(pw); onUnlock();
  }
  async function handleEnter(e) {
    e.preventDefault();
    if (!(await checkPassword(pw))) return setError("That's not it — try again.");
    onUnlock();
  }
  if (!mode) return null;
  return (
    <div className="min-h-screen flex items-center justify-center px-6" style={{ background:"linear-gradient(160deg,#F0BE55,#EE7C8E 55%,#E8677D)" }}>
      <div className="w-full max-w-sm bg-white rounded-3xl p-7 shadow-xl">
        <div className="flex flex-col items-center mb-5">
          <div className="rounded-full p-3 mb-2 text-2xl" style={{ background:"#FDE6CC" }}>🌸</div>
          <h1 className="display text-xl font-extrabold" style={{ color:"#3E2B2F" }}>Two of Us</h1>
          <p className="text-xs font-semibold" style={{ color:"#8A6E72" }}>{mode==="create" ? "Set a password to protect this app" : "Enter your password"}</p>
        </div>
        {mode==="create" ? (
          <form onSubmit={handleCreate} className="space-y-3">
            <input type="password" placeholder="New password" value={pw} onChange={e=>setPw(e.target.value)} className="w-full rounded-xl border-2 px-3 py-2 font-semibold" style={{ borderColor:"#FDE6CC" }} autoFocus />
            <input type="password" placeholder="Confirm password" value={pw2} onChange={e=>setPw2(e.target.value)} className="w-full rounded-xl border-2 px-3 py-2 font-semibold" style={{ borderColor:"#FDE6CC" }} />
            {error && <div className="text-xs font-bold" style={{ color:"#E8677D" }}>{error}</div>}
            <button type="submit" className="w-full rounded-xl py-2.5 font-bold text-white" style={{ background:"#E8677D" }}>🔒 Set password</button>
            <p className="text-center" style={{ fontSize:11, color:"#8A6E72" }}>Stored only on this device — this deters casual snooping, it isn't encryption.</p>
          </form>
        ) : (
          <form onSubmit={handleEnter} className="space-y-3">
            <input type="password" placeholder="Password" value={pw} onChange={e=>setPw(e.target.value)} className="w-full rounded-xl border-2 px-3 py-2 font-semibold" style={{ borderColor:"#FDE6CC" }} autoFocus />
            {error && <div className="text-xs font-bold" style={{ color:"#E8677D" }}>{error}</div>}
            <button type="submit" className="w-full rounded-xl py-2.5 font-bold text-white" style={{ background:"#E8677D" }}>🔒 Unlock</button>
          </form>
        )}
      </div>
    </div>
  );
}

// ---------- main app ----------
function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [tab, setTab] = useState("home");
  const [cycles, setCycles] = useState(null);
  const [intimacy, setIntimacy] = useState(null);
  const [toast, setToast] = useState("");

  useEffect(() => { if (!unlocked) return; const d = loadData(); setCycles(d.cycles); setIntimacy(d.intimacy); }, [unlocked]);
  const persistCycles = useCallback((next) => { setCycles(next); saveCycles(next); }, []);
  const persistIntimacy = useCallback((next) => { setIntimacy(next); saveIntimacy(next); }, []);
  const model = useMemo(() => cycles ? computeModel(cycles) : null, [cycles]);
  const flash = (msg) => { setToast(msg); setTimeout(()=>setToast(""), 1800); };

  function logBleeding(dateStr) {
    persistCycles([...cycles, { id:"c"+Date.now(), bleedingStart:dateStr, moodDay:null, ovulationActual:null }]);
    flash(`Logged bleeding start: ${fmt(dateStr)}`);
  }
  function logMood(dateStr) {
    const sorted = [...cycles].sort((a,b)=>(a.bleedingStart<b.bleedingStart?-1:1));
    let target = sorted.find(c => diffDays(dateStr,c.bleedingStart)>=0 && diffDays(dateStr,c.bleedingStart)<=6) || sorted[sorted.length-1];
    persistCycles(cycles.map(c => c.id===target.id ? {...c, moodDay:dateStr} : c));
    flash(`Logged mood day: ${fmt(dateStr)}`);
  }
  function logOvulation(dateStr) {
    const sorted = [...cycles].sort((a,b)=>(a.bleedingStart<b.bleedingStart?-1:1));
    const target = sorted.filter(c=>c.bleedingStart<=dateStr).pop() || sorted[sorted.length-1];
    persistCycles(cycles.map(c => c.id===target.id ? {...c, ovulationActual:dateStr} : c));
    flash(`Logged ovulation: ${fmt(dateStr)}`);
  }
  function logIntimacy(dateStr) {
    if (intimacy.includes(dateStr)) { flash("Already logged that day"); return; }
    persistIntimacy([...intimacy, dateStr].sort());
    flash(`Logged intimacy: ${fmt(dateStr)}`);
  }

  if (!unlocked) return <LockScreen onUnlock={() => setUnlocked(true)} />;
  if (!cycles || !model) return <div style={{ background:COLORS.bg, minHeight:"100vh" }} className="flex items-center justify-center"><div className="text-sm font-semibold" style={{ color:COLORS.inkSoft }}>Loading…</div></div>;

  return (
    <div style={{ background:COLORS.bg, minHeight:"100vh" }} className="pb-20">
      <div className="px-5 pt-6 pb-3 flex items-center justify-between">
        <div>
          <h1 className="display text-2xl font-extrabold" style={{ color:COLORS.ink }}>Two of Us</h1>
          <p className="text-xs font-semibold" style={{ color:COLORS.inkSoft }}>Cycle &amp; connection tracker</p>
        </div>
        <button onClick={() => setUnlocked(false)} className="rounded-full p-2 text-sm" style={{ background:COLORS.card }} title="Lock app">🔒</button>
      </div>

      {tab==="home" && <HomeTab model={model} intimacy={intimacy} />}
      {tab==="log" && <LogTab onBleeding={logBleeding} onMood={logMood} onOvulation={logOvulation} onIntimacy={logIntimacy} />}
      {tab==="history" && <HistoryTab cycles={model.cyclesWithEstimates} intimacy={intimacy} />}
      {tab==="stats" && <StatsTab model={model} intimacy={intimacy} />}

      {toast && <div className="fixed left-1/2 -translate-x-1/2 bottom-24 px-4 py-2 rounded-full text-sm font-bold shadow-lg" style={{ background:COLORS.ink, color:"#fff" }}>{toast}</div>}

      <nav className="fixed bottom-0 left-0 right-0 flex justify-around py-2.5 border-t" style={{ background:COLORS.card, borderColor:COLORS.peachSoft }}>
        {[
          { id:"home", emoji:"📅", label:"Home" },
          { id:"log", emoji:"➕", label:"Log" },
          { id:"history", emoji:"📈", label:"History" },
          { id:"stats", emoji:"❤️", label:"Stats" },
        ].map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} className="flex flex-col items-center gap-0.5 px-3 py-1 rounded-xl" style={{ color: tab===t.id ? COLORS.coral : COLORS.inkSoft }}>
            <span>{t.emoji}</span>
            <span className="font-bold" style={{ fontSize:10 }}>{t.label}</span>
          </button>
        ))}
      </nav>
    </div>
  );
}

function HomeTab({ model, intimacy }) {
  const { predictedBleeding, predictedMood, predictedOvulation, cycleLength } = model;
  const fertileStart = addDays(predictedOvulation, -3), fertileEnd = addDays(predictedOvulation, 1);
  const inFertileWindow = todayISO() >= fertileStart && todayISO() <= fertileEnd;
  return (
    <div className="px-5 space-y-4">
      <div className="rounded-3xl p-5" style={{ background:COLORS.card }}><CycleWheel model={model} /></div>
      {inFertileWindow && <div className="rounded-2xl p-3 text-center font-bold text-sm" style={{ background:COLORS.plumSoft, color:COLORS.plum }}>🌙 Estimated fertile window — today</div>}
      <div className="grid grid-cols-3 gap-2.5">
        <Pill color={COLORS.peach} bg={COLORS.peachSoft} emoji="🌙" label="Mood day" sub={daysUntilLabel(predictedMood)} />
        <Pill color={COLORS.coral} bg={COLORS.coralSoft} emoji="💧" label="Bleeding" sub={daysUntilLabel(predictedBleeding)} />
        <Pill color={COLORS.plum} bg={COLORS.plumSoft} emoji="❤️" label="Ovulation" sub={daysUntilLabel(predictedOvulation)} />
      </div>
      <div className="rounded-2xl p-4" style={{ background:COLORS.card }}>
        <div className="text-xs font-bold uppercase tracking-wide mb-2" style={{ color:COLORS.inkSoft }}>Predicted dates</div>
        <div className="space-y-2 text-sm font-semibold" style={{ color:COLORS.ink }}>
          <div className="flex justify-between"><span>Mood day</span><span>{fmtFull(predictedMood)}</span></div>
          <div className="flex justify-between"><span>Bleeding starts</span><span>{fmtFull(predictedBleeding)}</span></div>
          <div className="flex justify-between"><span>Ovulation</span><span>{fmtFull(predictedOvulation)}</span></div>
        </div>
        <div className="mt-3" style={{ color:COLORS.inkSoft, fontSize:11 }}>Based on a {cycleLength}-day average cycle — updates automatically as you log real dates.</div>
      </div>
      <div className="rounded-2xl p-4" style={{ background:COLORS.card }}>
        <div className="text-xs font-bold uppercase tracking-wide mb-1" style={{ color:COLORS.inkSoft }}>Last time together</div>
        <div className="text-base font-extrabold" style={{ color:COLORS.coral }}>{intimacy.length ? fmtFull(intimacy[intimacy.length-1]) : "Not logged yet"}</div>
      </div>
    </div>
  );
}

function LogTab({ onBleeding, onMood, onOvulation, onIntimacy }) {
  const [bleedDate, setBleedDate] = useState(todayISO());
  const [moodDate, setMoodDate] = useState(todayISO());
  const [ovDate, setOvDate] = useState(todayISO());
  const [intDate, setIntDate] = useState(todayISO());
  const rows = [
    { title:"Bleeding start", color:COLORS.coral, bg:COLORS.coralSoft, emoji:"💧", value:bleedDate, set:setBleedDate, action:onBleeding },
    { title:"Mood day", color:COLORS.peach, bg:COLORS.peachSoft, emoji:"🌙", value:moodDate, set:setMoodDate, action:onMood },
    { title:"Ovulation", color:COLORS.plum, bg:COLORS.plumSoft, emoji:"❤️", value:ovDate, set:setOvDate, action:onOvulation },
    { title:"Intimacy", color:COLORS.gold, bg:COLORS.goldSoft, emoji:"❤️", value:intDate, set:setIntDate, action:onIntimacy },
  ];
  return (
    <div className="px-5 space-y-3">
      <p className="text-sm font-semibold mb-1" style={{ color:COLORS.inkSoft }}>Log an actual date. Predictions adjust automatically.</p>
      {rows.map(r => (
        <div key={r.title} className="rounded-2xl p-4" style={{ background:COLORS.card }}>
          <div className="flex items-center gap-2 mb-3">
            <div className="rounded-full p-1.5 text-sm" style={{ background:r.bg }}>{r.emoji}</div>
            <div className="font-extrabold" style={{ color:COLORS.ink }}>{r.title}</div>
          </div>
          <div className="flex items-end gap-2">
            <input type="date" value={r.value} onChange={e=>r.set(e.target.value)} className="rounded-xl px-3 py-2 border-2 font-semibold" style={{ borderColor:COLORS.peachSoft, color:COLORS.ink }} />
            <button onClick={() => r.action(r.value)} className="rounded-xl px-4 py-2 font-bold text-white" style={{ background:r.color }}>✓ Log</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function HistoryTab({ cycles, intimacy }) {
  const sorted = [...cycles].sort((a,b)=>(a.bleedingStart<b.bleedingStart?1:-1));
  return (
    <div className="px-5 space-y-3">
      {sorted.map(c => {
        const inThisCycle = intimacy.filter(d => d>=c.bleedingStart && d<c.cycleEnd);
        return (
          <div key={c.id} className="rounded-2xl p-4" style={{ background:COLORS.card }}>
            <div className="flex items-center justify-between mb-2">
              <div className="font-extrabold" style={{ color:COLORS.ink }}>{fmt(c.bleedingStart)} cycle</div>
              <div className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background:COLORS.goldSoft, color:COLORS.gold }}>{inThisCycle.length} together</div>
            </div>
            <div className="grid grid-cols-3 gap-2 text-xs font-semibold" style={{ color:COLORS.inkSoft }}>
              <div>💧 {fmt(c.bleedingStart)}</div>
              <div>🌙 {c.moodDay ? fmt(c.moodDay) : "—"}</div>
              <div>❤️ {c.ovulationActual ? fmt(c.ovulationActual) : `~${fmt(c.ovulationEstimate)}`}</div>
            </div>
            {inThisCycle.length>0 && (
              <div className="mt-2 flex flex-wrap gap-1.5" style={{ color:COLORS.inkSoft, fontSize:11 }}>
                {inThisCycle.map(d => <span key={d} className="px-2 py-0.5 rounded-full" style={{ background:COLORS.coralSoft, color:COLORS.coral }}>{fmt(d)}</span>)}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function StatsTab({ model, intimacy }) {
  const byMonth = {};
  intimacy.forEach(d => { const key = d.slice(0,7); byMonth[key] = (byMonth[key]||0)+1; });
  const monthData = Object.keys(byMonth).sort().map(k => ({ label: toDate(k+"-01").toLocaleDateString("en-US",{month:"short"}), value: byMonth[k] }));

  const offsets = [];
  intimacy.forEach(d => {
    const cyc = model.cyclesWithEstimates.find(c => d>=c.bleedingStart && d<c.cycleEnd);
    if (cyc) offsets.push(diffDays(cyc.ovulationEstimate, d));
  });
  const bucket = {};
  offsets.forEach(o => { bucket[o] = (bucket[o]||0)+1; });
  const offsetData = [];
  for (let i=-10;i<=10;i++) offsetData.push({ day:i, label:String(i), value: bucket[i]||0 });

  const fertileCount = offsets.filter(o => o>=-3 && o<=1).length;
  const pct = intimacy.length ? Math.round((fertileCount/intimacy.length)*100) : 0;

  return (
    <div className="px-5 space-y-4">
      <div className="grid grid-cols-2 gap-2.5">
        <div className="rounded-2xl p-4" style={{ background:COLORS.card }}>
          <div className="text-3xl font-extrabold" style={{ color:COLORS.coral }}>{intimacy.length}</div>
          <div className="text-xs font-bold" style={{ color:COLORS.inkSoft }}>logged, all time</div>
        </div>
        <div className="rounded-2xl p-4" style={{ background:COLORS.card }}>
          <div className="text-3xl font-extrabold" style={{ color:COLORS.plum }}>{pct}%</div>
          <div className="text-xs font-bold" style={{ color:COLORS.inkSoft }}>near the fertile window</div>
        </div>
      </div>
      <div className="rounded-2xl p-4" style={{ background:COLORS.card }}>
        <div className="text-xs font-bold uppercase tracking-wide mb-2" style={{ color:COLORS.inkSoft }}>Per month</div>
        <SimpleBarChart data={monthData} barColor={COLORS.coral} />
      </div>
      <div className="rounded-2xl p-4" style={{ background:COLORS.card }}>
        <div className="text-xs font-bold uppercase tracking-wide mb-1" style={{ color:COLORS.inkSoft }}>Timing vs. ovulation</div>
        <div className="mb-2" style={{ color:COLORS.inkSoft, fontSize:11 }}>Days before (–) or after (+) estimated ovulation</div>
        <SimpleBarChart data={offsetData} barColor={COLORS.plumSoft} highlightZero />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
